name: Integration Tests

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        cache: true

    - name: Install dependencies
      run: |
        go mod download
        go mod tidy

    - name: Run unit tests
      run: make test

    - name: Run integration tests
      run: make test-integration
      timeout-minutes: 15

    - name: Upload coverage
      if: always()
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.out
        flags: unittests
        name: codecov-queen

  integration-tests-postgres:
    name: Postgres Integration
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
