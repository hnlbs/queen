version: 2

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  enable:
    # Оригинальные
    - copyloopvar
    - goconst
    - gocyclo
    - misspell
    - unconvert
    - unparam

    # Базовые (рекомендуемые)
    - errcheck      # Проверка необработанных ошибок
    - govet         # go vet
    - ineffassign   # Неиспользуемые присваивания
    - staticcheck   # Статический анализ
    - unused        # Неиспользуемый код

    # Стиль
    - whitespace    # Пробелы

    # Ошибки
    - errorlint     # Ошибки wrapping

    # Сложность
    - gocognit      # Когнитивная сложность

    # Безопасность
    # - gosec         # Security issues (disabled: too many false positives)

    # Performance
    - prealloc      # Preallocation slices

    # Bugs
    - bodyclose     # HTTP body close
    # - noctx         # HTTP request without context (disabled: only affects tests)
    - sqlclosecheck # SQL rows/stmt close

linters-settings:
  goconst:
    min-len: 3
    min-occurrences: 3

  gocyclo:
    min-complexity: 15

  gocognit:
    min-complexity: 20

  misspell:
    locale: US

  gosec:
    excludes:
      - G201  # SQL string formatting (safe: only table names with QuoteIdentifier)
      - G301  # Directory permissions (0755 is standard for source code)
      - G304  # File path from variable (controlled paths only)
      - G306  # File permissions (0644 is standard for source code)

  staticcheck:
    checks: ["all"]

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-dirs:
    - third_party
    - builtin
    - examples
  exclude:
    - "G201: SQL string formatting"
    - "G301: Expect directory permissions"
    - "G304: Potential file inclusion"
    - "G306: Expect WriteFile permissions"
  exclude-rules:
    # Exclude some linters from running on tests
    - linters:
        - errcheck
        - goconst
        - gocyclo
        - gocognit
        - gosec
        - goerr113
      path: _test\.go

    # Exclude specific gosec rules (security false positives)
    - linters:
        - gosec
      text: "G201: SQL string formatting"
    - linters:
        - gosec
      text: "G301: Expect directory permissions"
    - linters:
        - gosec
      text: "G304: Potential file inclusion"
    - linters:
        - gosec
      text: "G306: Expect WriteFile permissions"

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
